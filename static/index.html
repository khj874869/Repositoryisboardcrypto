<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Flow Live</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #111827; color: #f9fafb; }
    h1, h2 { margin-bottom: 8px; }
    .grid { display: grid; grid-template-columns: 1.3fr 0.9fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
    .card { background: #1f2937; border-radius: 14px; padding: 18px; box-shadow: 0 6px 16px rgba(0,0,0,0.18); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; font-size: 14px; vertical-align: top; }
    .buy { color: #22c55e; font-weight: bold; }
    .sell { color: #ef4444; font-weight: bold; }
    .muted { color: #9ca3af; font-size: 13px; }
    .pill { display: inline-block; border-radius: 999px; padding: 4px 10px; background: #374151; font-size: 12px; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .stat { background: #374151; border-radius: 12px; padding: 8px 12px; }
    input, select, button { border-radius: 10px; border: 1px solid #4b5563; background: #111827; color: #f9fafb; padding: 10px 12px; }
    button { cursor: pointer; }
    form.inline { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .notif-unread { font-weight: bold; }
    .top-space { margin-top: 20px; }
    @media (max-width: 1100px) { .grid, .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Signal Flow Live</h1>
  <div class="muted">Upbit 실데이터 연동을 기본으로 사용하고, 네트워크 실패 시 시뮬레이터로 자동 전환할 수 있는 실시간 시그널 분석 데모입니다.</div>

  <div class="row" style="margin: 12px 0 20px;">
    <div class="stat">WebSocket: <span id="socket-status">연결 중...</span></div>
    <div class="stat">데이터 소스: <span id="source-status">확인 중...</span></div>
    <div class="stat">관심 종목: <span id="watch-count">0</span></div>
    <div class="stat">최근 시그널: <span id="signal-count">0</span></div>
    <div class="stat">읽지 않은 알림: <span id="unread-count">0</span></div>
  </div>

  <div class="grid">
    <section class="card stack">
      <div>
        <h2>인증</h2>
        <div class="muted">데모 계정: <code>demo / demo1234</code></div>
        <div id="auth-status" class="top-space">로그인 안 됨</div>
        <form id="login-form" class="inline">
          <input id="login-username" value="demo" placeholder="username" />
          <input id="login-password" value="demo1234" type="password" placeholder="password" />
          <button type="submit">로그인</button>
        </form>
        <form id="signup-form" class="inline">
          <input id="signup-username" placeholder="new username" />
          <input id="signup-email" placeholder="email" />
          <input id="signup-password" type="password" placeholder="password(8+)" />
          <button type="submit">회원가입</button>
        </form>
        <div class="muted" id="auth-message"></div>
      </div>

      <div>
        <h2>알림 설정</h2>
        <label><input type="checkbox" id="web-enabled" checked /> 웹 알림</label>
        <label style="margin-left: 12px;"><input type="checkbox" id="email-enabled" /> 이메일 알림(저장만)</label>
        <div class="top-space"><button id="save-settings">설정 저장</button></div>
      </div>
    </section>

    <section class="card stack">
      <div>
        <h2>내 관심 종목</h2>
        <form id="watch-form" class="inline">
          <select id="watch-symbol"></select>
          <button type="submit">추가</button>
        </form>
        <table class="top-space">
          <thead>
            <tr>
              <th>심볼</th>
              <th>가격</th>
              <th>등락률</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="watch-body"></tbody>
        </table>
      </div>

      <div>
        <h2>내 알림</h2>
        <table>
          <thead>
            <tr>
              <th>시간</th>
              <th>심볼</th>
              <th>전략</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="notification-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="grid-3">
    <section class="card">
      <h2>시장 개요</h2>
      <table>
        <thead>
          <tr>
            <th>심볼</th>
            <th>가격</th>
            <th>등락률</th>
            <th>RSI</th>
            <th>최근 시그널</th>
          </tr>
        </thead>
        <tbody id="overview-body"></tbody>
      </table>
    </section>

    <section class="card" style="grid-column: span 2;">
      <h2>실시간 시그널</h2>
      <table>
        <thead>
          <tr>
            <th>시간</th>
            <th>심볼</th>
            <th>유형</th>
            <th>전략</th>
            <th>사유</th>
          </tr>
        </thead>
        <tbody id="signal-body"></tbody>
      </table>
    </section>
  </div>

  <script>
    const overviewBody = document.getElementById('overview-body');
    const signalBody = document.getElementById('signal-body');
    const watchBody = document.getElementById('watch-body');
    const notificationBody = document.getElementById('notification-body');
    const socketStatus = document.getElementById('socket-status');
    const sourceStatus = document.getElementById('source-status');
    const watchCount = document.getElementById('watch-count');
    const signalCount = document.getElementById('signal-count');
    const unreadCount = document.getElementById('unread-count');
    const authStatus = document.getElementById('auth-status');
    const authMessage = document.getElementById('auth-message');
    const watchSymbol = document.getElementById('watch-symbol');
    const webEnabled = document.getElementById('web-enabled');
    const emailEnabled = document.getElementById('email-enabled');
    let token = localStorage.getItem('signal-flow-token');
    let currentUser = null;
    let assetRows = [];
    let activeSource = 'unknown';

    function formatPrice(value) {
      return new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 2 }).format(value);
    }

    function authHeaders() {
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    function renderAuthStatus() {
      authStatus.textContent = currentUser
        ? `로그인됨: ${currentUser.username} (${currentUser.email})`
        : '로그인 안 됨';
    }

    function renderOverview(rows) {
      overviewBody.innerHTML = rows.map(row => {
        const changeClass = row.change_rate >= 0 ? 'positive' : 'negative';
        const signalType = row.recent_signal_type || '-';
        const signalClass = signalType === 'BUY' ? 'buy' : (signalType === 'SELL' ? 'sell' : '');
        return `
          <tr>
            <td>${row.symbol} ${row.in_watchlist ? '<span class="pill">관심</span>' : ''}</td>
            <td>${formatPrice(row.price)}</td>
            <td class="${changeClass}">${row.change_rate.toFixed(2)}%</td>
            <td>${row.rsi14 ? row.rsi14.toFixed(1) : '-'}</td>
            <td class="${signalClass}">${signalType}</td>
          </tr>
        `;
      }).join('');
      watchCount.textContent = rows.filter(r => r.in_watchlist).length;
    }

    function renderSignals(rows) {
      signalBody.innerHTML = rows.map(row => {
        const signalClass = row.signal_type === 'BUY' ? 'buy' : 'sell';
        return `
          <tr>
            <td>${new Date(row.created_at).toLocaleTimeString('ko-KR')}</td>
            <td>${row.symbol}</td>
            <td class="${signalClass}">${row.signal_type}</td>
            <td>${row.strategy_name}</td>
            <td>${row.reason}</td>
          </tr>
        `;
      }).join('');
      signalCount.textContent = rows.length;
    }

    function renderWatchlist(rows) {
      watchBody.innerHTML = rows.map(row => `
        <tr>
          <td>${row.symbol}</td>
          <td>${formatPrice(row.last_price)}</td>
          <td class="${row.change_rate >= 0 ? 'positive' : 'negative'}">${row.change_rate.toFixed(2)}%</td>
          <td><button data-symbol="${row.symbol}" class="delete-watch">삭제</button></td>
        </tr>
      `).join('');
    }

    function renderNotifications(rows) {
      notificationBody.innerHTML = rows.map(row => `
        <tr>
          <td>${new Date(row.created_at).toLocaleTimeString('ko-KR')}</td>
          <td>${row.symbol} <span class="${row.signal_type === 'BUY' ? 'buy' : 'sell'}">${row.signal_type}</span></td>
          <td>${row.strategy_name}<div class="muted">${row.reason}</div></td>
          <td>
            <span class="${row.is_read ? '' : 'notif-unread'}">${row.is_read ? '읽음' : '미확인'}</span>
            ${row.is_read ? '' : `<div class="top-space"><button data-id="${row.id}" class="read-notif">읽음 처리</button></div>`}
          </td>
        </tr>
      `).join('');
      unreadCount.textContent = rows.filter(row => !row.is_read).length;
    }

    function populateAssetSelect() {
      watchSymbol.innerHTML = assetRows.map(row => `<option value="${row.symbol}">${row.symbol} - ${row.name}</option>`).join('');
    }


    async function loadSourceStatus() {
      const response = await fetch('/api/source-status');
      const data = await response.json();
      activeSource = data.active_source || data.requested_source || 'unknown';
      const interval = data.interval ? ` / ${data.interval}` : '';
      const state = data.state ? ` (${data.state})` : '';
      sourceStatus.textContent = `${activeSource}${interval}${state}`;
    }

    async function loadAssets() {
      const response = await fetch('/api/assets');
      assetRows = await response.json();
      populateAssetSelect();
    }

    async function loadOverview() {
      const response = await fetch('/api/market/overview', { headers: authHeaders() });
      const data = await response.json();
      renderOverview(data);
    }

    async function loadSignals() {
      const response = await fetch('/api/signals/recent?limit=12');
      const data = await response.json();
      renderSignals(data);
    }

    async function loadMe() {
      if (!token) {
        currentUser = null;
        renderAuthStatus();
        return;
      }
      const response = await fetch('/api/auth/me', { headers: authHeaders() });
      if (!response.ok) {
        token = null;
        currentUser = null;
        localStorage.removeItem('signal-flow-token');
        renderAuthStatus();
        return;
      }
      currentUser = await response.json();
      renderAuthStatus();
    }

    async function loadWatchlist() {
      if (!token) {
        watchBody.innerHTML = '<tr><td colspan="4" class="muted">로그인 후 확인 가능합니다.</td></tr>';
        return;
      }
      const response = await fetch('/api/watchlist', { headers: authHeaders() });
      const data = await response.json();
      renderWatchlist(data);
    }

    async function loadNotifications() {
      if (!token) {
        notificationBody.innerHTML = '<tr><td colspan="4" class="muted">로그인 후 확인 가능합니다.</td></tr>';
        unreadCount.textContent = '0';
        return;
      }
      const response = await fetch('/api/notifications?limit=10', { headers: authHeaders() });
      const data = await response.json();
      renderNotifications(data);
    }

    async function loadNotificationSettings() {
      if (!token) {
        webEnabled.checked = true;
        emailEnabled.checked = false;
        return;
      }
      const response = await fetch('/api/notification-settings', { headers: authHeaders() });
      if (!response.ok) return;
      const data = await response.json();
      webEnabled.checked = data.web_enabled;
      emailEnabled.checked = data.email_enabled;
    }

    async function authenticate(endpoint, payload) {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      if (!response.ok) {
        authMessage.textContent = data.detail || '인증에 실패했습니다.';
        return;
      }
      token = data.access_token;
      localStorage.setItem('signal-flow-token', token);
      currentUser = data.user;
      authMessage.textContent = `${currentUser.username} 계정으로 인증되었습니다.`;
      renderAuthStatus();
      await refreshAll();
    }

    async function refreshAll() {
      await Promise.all([
        loadAssets(),
        loadSourceStatus(),
        loadMe(),
        loadOverview(),
        loadSignals(),
        loadWatchlist(),
        loadNotifications(),
        loadNotificationSettings(),
      ]);
    }

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      await authenticate('/api/auth/login', {
        username: document.getElementById('login-username').value,
        password: document.getElementById('login-password').value,
      });
    });

    document.getElementById('signup-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      await authenticate('/api/auth/signup', {
        username: document.getElementById('signup-username').value,
        email: document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
      });
    });

    document.getElementById('save-settings').addEventListener('click', async () => {
      if (!token) {
        authMessage.textContent = '로그인 후 저장할 수 있습니다.';
        return;
      }
      await fetch('/api/notification-settings', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ web_enabled: webEnabled.checked, email_enabled: emailEnabled.checked }),
      });
      authMessage.textContent = '알림 설정을 저장했습니다.';
    });

    document.getElementById('watch-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!token) {
        authMessage.textContent = '로그인 후 관심 종목을 추가할 수 있습니다.';
        return;
      }
      await fetch('/api/watchlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ symbol: watchSymbol.value }),
      });
      await refreshAll();
    });

    watchBody.addEventListener('click', async (event) => {
      const button = event.target.closest('.delete-watch');
      if (!button) return;
      await fetch(`/api/watchlist/${button.dataset.symbol}`, {
        method: 'DELETE',
        headers: authHeaders(),
      });
      await refreshAll();
    });

    notificationBody.addEventListener('click', async (event) => {
      const button = event.target.closest('.read-notif');
      if (!button) return;
      await fetch(`/api/notifications/${button.dataset.id}/read`, {
        method: 'PATCH',
        headers: authHeaders(),
      });
      await refreshAll();
    });

    function connectSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const socket = new WebSocket(`${protocol}://${window.location.host}/ws/stream`);
      socketStatus.textContent = '연결 중';

      socket.onopen = () => {
        socketStatus.textContent = '연결됨';
        setInterval(() => {
          if (socket.readyState === WebSocket.OPEN) {
            socket.send('ping');
          }
        }, 3000);
      };

      socket.onmessage = async (event) => {
        const message = JSON.parse(event.data);
        if (message.type === 'signal' || message.type === 'market_snapshot') {
          await Promise.all([loadOverview(), loadSignals(), loadWatchlist(), loadNotifications()]);
        }
      };

      socket.onclose = () => {
        socketStatus.textContent = '재연결 중';
        setTimeout(connectSocket, 2000);
      };
    }

    refreshAll();
    connectSocket();
  </script>
</body>
</html>
